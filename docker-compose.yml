version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Injected by Azure DevOps pipeline from variable group: tst-cloud-opt-{env}
    # (e.g. tst-cloud-opt-dev, tst-cloud-opt-test)
    # Values are passed as pipeline variables → host env → picked up here
    environment:
      - AZURE_TENANT_ID
      - AZURE_CLIENT_ID
      - AZURE_CLIENT_SECRET
      - AZURE_SUBSCRIPTION_ID
    volumes:
      - ./deletion_scripts:/tmp/deletion_scripts
    restart: unless-stopped

  dashboard-dev:
    image: node:20-alpine
    working_dir: /dashboard
    volumes:
      - ./dashboard:/dashboard
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    profiles:
      - dev
